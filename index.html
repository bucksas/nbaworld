<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMPERIAL NBAWorld.lt Cup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090e;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #22222e;
  --border: #2a2a38;
  --text: #e8e8f0;
  --muted: #7a7a9a;
  --gold: #C9A84C;
  --gold2: #f0c060;
  --silver: #9a9ab0;
  --bronze: #b87040;
  --green: #2ecc71;
  --green-dim: #1a5c38;
  --blue: #4a9eff;
  --blue-dim: #1a3a6c;
  --red: #e74c3c;
  --purple: #9b59b6;
  --wb-color: #2ecc71;
  --wb-bg: #0d3320;
  --co-color: #9b59b6;
  --co-bg: #22103a;
  --radius: 12px;
  --radius-sm: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3,.display{font-family:'Bebas Neue',cursive;letter-spacing:.05em}
.mono{font-family:'DM Mono',monospace}

/* NAV */
#topnav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,9,14,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:0 12px;height:52px}
.nav-logo{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--gold);margin-right:8px;white-space:nowrap}
.nav-btn{background:none;border:none;color:var(--muted);padding:8px 12px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap}
.nav-btn:hover,.nav-btn.active{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--gold)}
#main{margin-top:52px;padding:16px;max-width:1200px;margin-left:auto;margin-right:auto}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}

/* STAT TILES */
.tiles{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.tile{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;text-align:center;min-width:80px;flex:1}
.tile-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--gold);line-height:1}
.tile-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.tile.gold{border-color:var(--gold);background:rgba(201,168,76,.08)}
.tile.gold .tile-val{color:var(--gold2)}

/* BADGES */
.badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600;line-height:1.6}
.badge-title{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.badge-po{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.badge-div{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3)}
.badge-legacy{background:var(--surface3);color:var(--muted);border:1px solid var(--border)}
.badge-co{background:var(--co-bg);color:var(--co-color);border:1px solid rgba(155,89,182,.3)}

/* ROUND TAGS */
.tag{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;line-height:1.7;letter-spacing:.05em}
.tag-F{background:rgba(201,168,76,.25);color:var(--gold);border:1px solid var(--gold)}
.tag-WC,.tag-QF,.tag-SF{background:var(--wb-bg);color:var(--wb-color);border:1px solid rgba(46,204,113,.4)}
.tag-CO{background:var(--co-bg);color:var(--co-color);border:1px solid rgba(155,89,182,.4)}
.tag-REG{background:var(--surface3);color:var(--muted);border:1px solid var(--border)}

/* TABLES */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface3);color:var(--muted);padding:8px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
th .sort-icon{margin-left:4px;opacity:.4}
th.sorted .sort-icon{opacity:1;color:var(--gold)}
td{padding:8px 10px;border-top:1px solid var(--border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.03)}
.num{text-align:right;font-family:'DM Mono',monospace}
.win{color:var(--green)}
.loss{color:var(--red)}

/* TEAM CARDS */
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:12px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.team-card:hover{border-color:var(--gold);background:var(--surface2)}
.team-card.legacy{opacity:.7}
.team-avatar{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,var(--surface3),var(--surface2));display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:20px;color:var(--gold);flex-shrink:0;border:1px solid var(--border)}
.team-info{flex:1;min-width:0}
.team-name{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.03em;color:var(--text)}
.team-manager{font-size:12px;color:var(--muted);margin-bottom:4px}
.team-badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.team-stats{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}

/* SIDEBAR LAYOUT */
.page-with-sidebar{display:flex;gap:16px}
.sidebar{width:220px;flex-shrink:0;position:sticky;top:68px;height:calc(100vh - 80px);overflow-y:auto}
.sidebar-item{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .2s;display:flex;align-items:center;gap:8px}
.sidebar-item:hover,.sidebar-item.active{color:var(--text);background:var(--surface2)}
.sidebar-item.active{color:var(--gold);border-left:2px solid var(--gold)}
.sidebar-section{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:12px 12px 4px}
.main-content{flex:1;min-width:0}

/* PANTHEON */
.pantheon-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.pantheon-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.pantheon-card.rank1::before{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.pantheon-card.rank2::before{background:linear-gradient(90deg,var(--silver),#c0c0d0)}
.pantheon-card.rank3::before{background:linear-gradient(90deg,var(--bronze),#d0905a)}
.pantheon-card.rank4::before,.pantheon-card.rank5::before{background:linear-gradient(90deg,var(--surface3),var(--border))}
.p-rank{font-family:'Bebas Neue',cursive;font-size:48px;color:rgba(255,255,255,.06);position:absolute;top:8px;right:16px;line-height:1}
.p-name{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:.03em}
.p-manager{font-size:13px;color:var(--muted);margin-bottom:12px}

/* MATCHUP CARDS */
.matchup-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:13px}
.matchup-week{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:50px}
.matchup-score{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.matchup-winner{color:var(--gold)}
.matchup-loser{color:var(--muted)}

/* MODAL / BOTTOM SHEET */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
#modal-overlay.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;padding:20px}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}

/* H2H */
.h2h-header{display:flex;justify-content:space-between;align-items:center;padding:16px;background:var(--surface2);border-radius:12px;margin-bottom:12px}
.h2h-team{text-align:center;flex:1}
.h2h-vs{font-family:'Bebas Neue',cursive;font-size:24px;color:var(--muted);padding:0 12px}
.h2h-record{font-family:'DM Mono',monospace;font-size:22px;font-weight:500}

/* DETAIL */
.detail-header{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.detail-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:12px}
.detail-back:hover{color:var(--text)}

/* RECORDS PAGE */
.record-highlight{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.record-val{font-family:'DM Mono',monospace;font-size:18px;color:var(--gold);font-weight:500}
.record-lbl{font-size:12px;color:var(--muted)}

/* CHAMPIONS TABLE */
.champions-table{width:100%;border-collapse:collapse}
.champions-table tr{border-bottom:1px solid var(--border)}
.champions-table td{padding:10px 8px;font-size:13px}
.champions-table .yr{font-family:'DM Mono',monospace;color:var(--muted);width:48px}
.champions-table .trophy{font-size:16px;width:28px}
.champ-latest{background:rgba(201,168,76,.06)}

/* SECTION HEADERS */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.05em;color:var(--text)}
.sec-sub{font-size:11px;color:var(--muted)}

/* PLAYER LIST */
.player-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.player-rank{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:20px}
.player-name{flex:1;font-size:13px}
.player-years{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.player-pts{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold)}

/* DIVISION SECTION */
.div-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.div-item{background:var(--surface3);border-radius:6px;padding:8px 10px}
.div-year{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.div-name{font-size:12px;color:var(--text)}

/* SEARCH */
.search-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;width:100%;outline:none}
.search-box:focus{border-color:var(--gold)}

/* CO SECTION */
.co-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(155,89,182,.08);border:1px solid rgba(155,89,182,.2);border-radius:var(--radius-sm);margin-bottom:8px}

/* TRADES SECTION */
.trades-note{background:var(--surface3);border:1px dashed var(--border);border-radius:8px;padding:12px;color:var(--muted);font-size:12px;text-align:center}

/* RESPONSIVE */
@media(max-width:768px){
  .page-with-sidebar{flex-direction:column}
  .sidebar{width:100%;position:static;height:auto;display:flex;flex-wrap:wrap;gap:4px;padding:0}
  .sidebar-section{display:none}
  .p-rank{font-size:32px}
  .tiles{gap:6px}
  .tile{min-width:65px;padding:8px 10px}
  .tile-val{font-size:17px}
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page{animation:fadeIn .2s ease}

/* PILL SELECTOR */
.pill-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s}
.pill:hover,.pill.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600}

/* COLOR LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:4px}

/* SEASON FILTER */
.season-select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
</style>
</head>
<body>
<div id="topnav">
  <span class="nav-logo">🏀 IMPERIAL</span>
  <button class="nav-btn active" onclick="nav('pantheon')">Pantheon</button>
  <button class="nav-btn" onclick="nav('teams')">Teams</button>
  <button class="nav-btn" onclick="nav('matchups')">Matchups</button>
  <button class="nav-btn" onclick="nav('records')">Records</button>
</div>

<div id="main"></div>

<!-- Modal overlay -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-sheet" id="modal-content">
    <div class="modal-handle"></div>
  </div>
</div>

// HELPERS
// ============================================================
function pct(w,l){const t=w+l;return t?((w/t)*100).toFixed(1)+'%':'—'}
function pctNum(w,l){const t=w+l;return t?(w/t):0}
function oid2team(oid){return D.owners[oid]?.team||oid}
function oid2mgr(oid){return D.owners[oid]?.manager||''}
function initials(name){return name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function sortByKey(arr,key,asc=true){return [...arr].sort((a,b)=>asc?(a[key]>b[key]?1:-1):(a[key]<b[key]?1:-1))}
function fmt(n){return n==null?'—':Number.isInteger(n)?n:parseFloat(n).toFixed(1)}

function tagHTML(round){
  if(!round||round==='REG') return '';
  return `<span class="tag tag-${round}">${round}</span>`;
}

function makeSortable(tbl,id){
  const ths=tbl.querySelectorAll('th[data-sort]');
  const states={};
  ths.forEach(th=>{
    th.innerHTML=th.innerHTML+' <span class="sort-icon">↕</span>';
    th.addEventListener('click',()=>{
      const col=th.dataset.sort;
      const type=th.dataset.type||'str';
      const asc=states[id+col]!=='asc';
      states[id+col]=asc?'asc':'desc';
      ths.forEach(t=>{t.classList.remove('sorted');t.querySelector('.sort-icon').textContent='↕'});
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent=asc?'↑':'↓';
      const tbody=tbl.querySelector('tbody');
      const rows=[...tbody.querySelectorAll('tr')];
      rows.sort((a,b)=>{
        const av=a.querySelector(`td[data-col="${col}"]`)?.dataset.val||'';
        const bv=b.querySelector(`td[data-col="${col}"]`)?.dataset.val||'';
        if(type==='num') return asc?parseFloat(av)-parseFloat(bv):parseFloat(bv)-parseFloat(av);
        return asc?av.localeCompare(bv):bv.localeCompare(av);
      });
      rows.forEach(r=>tbody.appendChild(r));
    });
  });
}

function pantheonScore(oid){
  const s=D.owners[oid];
  if(!s) return 0;
  const t=s.titles.length;
  const divT=s.div_titles||0;
  const regTotal=s.reg_w+s.reg_l;
  const regPct=regTotal?s.reg_w/regTotal:0;
  const top3=(s.runner_up.length+s.third.length);
  const pa=s.playoff_apps;
  const seasons=s.seasons.length;
  return t*1000+divT*50+regPct*100+top3*10+pa*2+seasons*0.1;
}

// NAV
// ============================================================
let currentPage='pantheon';
let pageStack=[];

function nav(page,pushStack=true){
  if(pushStack&&currentPage!==page) pageStack.push(currentPage);
  currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const pages=['pantheon','teams','matchups','records'];
  const idx=pages.indexOf(page.split(':')[0]);
  if(idx>=0) document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  render(page);
}

function goBack(){
  if(pageStack.length>0) nav(pageStack.pop(),false);
  else nav('teams',false);
}

function render(page){
  const m=document.getElementById('main');
  m.className='page';
  const [base,arg]=page.split(':');
  if(base==='pantheon') m.innerHTML=renderPantheon();
  else if(base==='teams') m.innerHTML=renderTeams(arg);
  else if(base==='detail') m.innerHTML=renderDetail(arg);
  else if(base==='matchups') m.innerHTML=renderMatchups(arg);
  else if(base==='records') m.innerHTML=renderRecords();
  afterRender(page);
}

function afterRender(page){
  document.querySelectorAll('table[data-sortable]').forEach(tbl=>{
    makeSortable(tbl,tbl.id||Math.random());
  });
}

  // Top 2 scorers for card
  const topScorers=s.top_scorers.slice(0,2).map(p=>`<span style="color:var(--muted)">${p.name.split(' ').pop()}</span>`).join(', ');
  
  return `<div class="team-card ${isLegacy?'legacy':''}" id="tc-${oid}" onclick="nav('detail:${oid}')">
    <div class="team-avatar">${initials(s.team)}</div>
    <div class="team-info">
      <div class="team-name">${s.team}</div>
      <div class="team-manager">${s.manager} · ${s.seasons.length} seasons</div>
      <div class="team-badges">${titles}${ru}${thirds}${legacyBadge}${poBadge}${divBadge}</div>
      <div class="team-stats">${s.reg_w}–${s.reg_l} (${regPct}) reg · PO ${wbStr}${topScorers?` · ${topScorers}`:''}</div>
    </div>
    <div style="color:var(--muted);font-size:18px;align-self:center">›</div>
  </div>`;
}

function scrollToTeam(oid){
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const sid=document.getElementById('sid-'+oid);
  if(sid) sid.classList.add('active');
  const el=document.getElementById('tc-'+oid);
  if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
}

function filterTeams(val){
  teamsSearch=val.toLowerCase();
  document.querySelectorAll('.team-card').forEach(card=>{
    const txt=card.textContent.toLowerCase();
    card.style.display=txt.includes(teamsSearch)?'flex':'none';
  });
}

let h2hOid1=null,h2hOid2=null;

function renderMatchups(arg){
  if(arg){
    const parts=arg.split(',');
    if(parts.length===2){h2hOid1=parts[0];h2hOid2=parts[1];}
  }
  
  const currentOwners=Object.entries(D.owners).filter(([,s])=>s.is_current);
  
  let html=`<div>
    <div style="font-family:'Bebas Neue',cursive;font-size:28px;margin-bottom:4px">Matchups Central</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Head-to-head history between any two teams</div>`;
  
  // Team pickers
  html+=`<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:16px">
    <div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">TEAM 1</div>
      <select id="sel1" class="season-select" style="width:100%;padding:10px" onchange="updateH2H()">
        <option value="">— Select team —</option>`;
  currentOwners.forEach(([oid,s])=>{
    const sel=h2hOid1===oid?'selected':'';
    html+=`<option value="${oid}" ${sel}>${s.team}</option>`;
  });
  html+=`</select></div>
    <div style="font-family:'Bebas Neue',cursive;font-size:22px;color:var(--muted);text-align:center;margin-top:16px">VS</div>
    <div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">TEAM 2</div>
      <select id="sel2" class="season-select" style="width:100%;padding:10px" onchange="updateH2H()">
        <option value="">— Select team —</option>`;
  currentOwners.forEach(([oid,s])=>{
    const sel=h2hOid2===oid?'selected':'';
    html+=`<option value="${oid}" ${sel}>${s.team}</option>`;
  });
  html+=`</select></div>
  </div>`;
  
  html+=`<div id="h2h-result">`;
  if(h2hOid1&&h2hOid2&&h2hOid1!==h2hOid2){
    html+=buildH2HContent(h2hOid1,h2hOid2);
  } else {
    html+=`<div style="text-align:center;padding:40px;color:var(--muted)">Select two teams to see their matchup history</div>`;
  }
  html+=`</div></div>`;
  
  return html;
}

function updateH2H(){
  const oid1=document.getElementById('sel1').value;
  const oid2=document.getElementById('sel2').value;
  const result=document.getElementById('h2h-result');
  if(oid1&&oid2&&oid1!==oid2){
    h2hOid1=oid1;h2hOid2=oid2;
    result.innerHTML=buildH2HContent(oid1,oid2);
    afterRender('matchups');
  } else {
    result.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted)">Select two different teams to see their matchup history</div>`;
  }
}

function buildH2HContent(oid1,oid2){
  const s1=D.owners[oid1];
  const s2=D.owners[oid2];
  const h2h1=s1.h2h[oid2]||{w:0,l:0,co_w:0,co_l:0};
  const h2h2=s2.h2h[oid1]||{w:0,l:0,co_w:0,co_l:0};
  
  // Get all matchups between these two
  const games=D.all_matchups.filter(m=>{
    return (m.oid1===oid1&&m.oid2===oid2)||(m.oid1===oid2&&m.oid2===oid1);
  }).sort((a,b)=>b.year!==a.year?b.year-a.year:b.week-a.week);
  
  const regGames=games.filter(m=>m.round==='REG');
  const wbGames=games.filter(m=>['WC','QF','SF','F'].includes(m.round));
  const coGames=games.filter(m=>m.round==='CO');
  
  let html=`<div class="h2h-header">
    <div class="h2h-team">
      <div style="font-family:'Bebas Neue',cursive;font-size:18px">${s1.team}</div>
      <div class="h2h-record ${h2h1.w>h2h1.l?'win':h2h1.w<h2h1.l?'loss':''}">${h2h1.w}–${h2h1.l}</div>
      <div style="font-size:11px;color:var(--muted)">${pct(h2h1.w,h2h1.l)} win rate</div>
    </div>
    <div class="h2h-vs">VS</div>
    <div class="h2h-team">
      <div style="font-family:'Bebas Neue',cursive;font-size:18px">${s2.team}</div>
      <div class="h2h-record ${h2h2.w>h2h2.l?'win':h2h2.w<h2h2.l?'loss':''}">${h2h2.w}–${h2h2.l}</div>
      <div style="font-size:11px;color:var(--muted)">${pct(h2h2.w,h2h2.l)} win rate</div>
    </div>
  </div>`;
  
  if(coGames.length>0){
    html+=`<div style="display:flex;gap:8px;margin-bottom:8px;font-size:12px;color:var(--muted)">
      <span>Consolation: <span style="color:var(--co-color)">${h2h1.co_w}–${h2h1.co_l}</span> (not in H2H record)</span>
    </div>`;
  }
  
  // Legend
  html+=`<div class="legend">
    <span class="legend-item"><span class="tag tag-WC">WC</span> Wild Card</span>
    <span class="legend-item"><span class="tag tag-QF">QF</span> Quarterfinal</span>
    <span class="legend-item"><span class="tag tag-SF">SF</span> Semifinal</span>
    <span class="legend-item"><span class="tag tag-F">F</span> Finals</span>
    <span class="legend-item"><span class="tag tag-CO">CO</span> Consolation</span>
  </div>`;
  
  if(games.length===0){
    html+=`<div style="text-align:center;padding:30px;color:var(--muted)">No matchup data found (may only have 2011–2017 shared seasons)</div>`;
    return html;
  }
  
  // All games grouped by year
  const byYear={};
  games.forEach(m=>{
    if(!byYear[m.year]) byYear[m.year]=[];
    byYear[m.year].push(m);
  });
  
  Object.entries(byYear).sort((a,b)=>parseInt(b[0])-parseInt(a[0])).forEach(([yr,ymGames])=>{
    html+=`<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 4px">${yr}</div>`;
    ymGames.forEach(m=>{
      const isOid1Home=m.oid1===oid1;
      const t1score=isOid1Home?m.score1:m.score2;
      const t2score=isOid1Home?m.score2:m.score1;
      const winner=m.winner;
      const t1win=winner===oid1;
      const t2win=winner===oid2;
      const isCO=m.round==='CO';
      
      html+=`<div class="matchup-item" style="${isCO?'opacity:.8;border-color:rgba(155,89,182,.3)':''}">
        <span class="matchup-week">Wk ${m.week}</span>
        ${tagHTML(m.round)}
        <span class="matchup-score ${t1win?'matchup-winner':'matchup-loser'}">${t1score!=null?fmt(t1score):'—'}</span>
        <span style="color:var(--muted);font-size:11px">·</span>
        <span class="matchup-score ${t2win?'matchup-winner':'matchup-loser'}">${t2score!=null?fmt(t2score):'—'}</span>
        ${isCO?'<span style="font-size:10px;color:var(--co-color);margin-left:auto">consolation</span>':''}
      </div>`;
    });
  });
  
  return html;
}

function openH2H(oid1,oid2){
  h2hOid1=oid1;h2hOid2=oid2;
  nav('matchups:'+oid1+','+oid2);
}

// ============================================================
function renderRecords(){
  const allOwners=Object.entries(D.owners).filter(([,s])=>s.seasons.length>0);
  
  // Compute records
  const records=allOwners.map(([oid,s])=>{
    const regTotal=s.reg_w+s.reg_l;
    const wbTotal=s.wb_w+s.wb_l;
    return {
      oid,team:s.team,manager:s.manager,
      reg_w:s.reg_w,reg_l:s.reg_l,
      pct:regTotal?s.reg_w/regTotal:0,
      wb_w:s.wb_w,wb_l:s.wb_l,
      wb_pct:wbTotal?s.wb_w/wbTotal:0,
      titles:s.titles.length,
      div_titles:s.div_titles,
      playoff_apps:s.playoff_apps,
      seasons:s.seasons.length,
      top_week:s.top_weeks.length?s.top_weeks[0].score:0,
      co_w:s.co_w,co_l:s.co_l,
    };
  });
  
  // Individual records
  const mostTitles=records.reduce((a,b)=>b.titles>a.titles?b:a);
  const bestRegPct=records.filter(r=>r.reg_w+r.reg_l>=30).reduce((a,b)=>b.pct>a.pct?b:a);
  const mostWins=records.reduce((a,b)=>b.reg_w>a.reg_w?b:a);
  const mostPOApps=records.reduce((a,b)=>b.playoff_apps>a.playoff_apps?b:a);
  const mostDivTitles=records.reduce((a,b)=>b.div_titles>a.div_titles?b:a);
  const highestWeek=records.reduce((a,b)=>b.top_week>a.top_week?b:a);
  const bestPOPct=records.filter(r=>r.wb_w+r.wb_l>=3).reduce((a,b)=>b.wb_pct>a.wb_pct?b:a);
  
  let html=`<div style="font-family:'Bebas Neue',cursive;font-size:28px;margin-bottom:16px">League Records</div>`;
  
  // Highlight records
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">`;
  const highlights=[
    {lbl:'Most Championships',val:mostTitles.titles,team:mostTitles.team},
    {lbl:'Best Reg Win% (min 30 games)',val:(bestRegPct.pct*100).toFixed(1)+'%',team:bestRegPct.team},
    {lbl:'Most Regular Season Wins',val:mostWins.reg_w,team:mostWins.team},
    {lbl:'Most Playoff Appearances',val:mostPOApps.playoff_apps,team:mostPOApps.team},
    {lbl:'Most Division Titles',val:mostDivTitles.div_titles,team:mostDivTitles.team},
    {lbl:'Best Playoff Win% (min 3 games)',val:(bestPOPct.wb_pct*100).toFixed(1)+'%',team:bestPOPct.team},
  ];
  highlights.forEach(h=>{
    html+=`<div class="record-highlight">
      <div><div class="record-lbl">${h.lbl}</div><div style="font-size:12px;color:var(--text);margin-top:2px">${h.team}</div></div>
      <div class="record-val">${h.val}</div>
    </div>`;
  });
  html+=`</div>`;
  
  // Sortable table
  html+=`<div class="card">
    <div class="sec-hdr"><span class="sec-title">All-Time Standings</span></div>
    <div class="tbl-wrap">
    <table id="tbl-records" data-sortable>
      <thead><tr>
        <th data-sort="team">Team</th>
        <th data-sort="manager">Manager</th>
        <th data-sort="titles" data-type="num">🏆</th>
        <th data-sort="div" data-type="num">🏅 Div</th>
        <th data-sort="seasons" data-type="num">Seasons</th>
        <th data-sort="pa" data-type="num">PO Apps</th>
        <th data-sort="rw" data-type="num">Reg W</th>
        <th data-sort="rl" data-type="num">Reg L</th>
        <th data-sort="pct" data-type="num">Reg Win%</th>
        <th data-sort="wbw" data-type="num">PO W</th>
        <th data-sort="wbl" data-type="num">PO L</th>
        <th data-sort="wbpct" data-type="num">PO Win%</th>
        <th data-sort="cow" data-type="num">CO W</th>
        <th data-sort="col" data-type="num">CO L</th>
      </tr></thead>
      <tbody>`;
  
  records.sort((a,b)=>b.pct-a.pct).forEach(r=>{
    const wbTotal=r.wb_w+r.wb_l;
    html+=`<tr onclick="nav('detail:${r.oid}')" style="cursor:pointer">
      <td data-col="team" data-val="${r.team}"><strong>${r.team}</strong></td>
      <td data-col="manager" data-val="${r.manager}" style="color:var(--muted)">${r.manager}</td>
      <td data-col="titles" data-val="${r.titles}" class="num">${r.titles>0?'🏆'.repeat(Math.min(r.titles,3))+(r.titles>3?' '+r.titles:''):''}</td>
      <td data-col="div" data-val="${r.div_titles}" class="num">${r.div_titles||'—'}</td>
      <td data-col="seasons" data-val="${r.seasons}" class="num">${r.seasons}</td>
      <td data-col="pa" data-val="${r.playoff_apps}" class="num">${r.playoff_apps}</td>
      <td data-col="rw" data-val="${r.reg_w}" class="num win">${r.reg_w}</td>
      <td data-col="rl" data-val="${r.reg_l}" class="num loss">${r.reg_l}</td>
      <td data-col="pct" data-val="${r.pct.toFixed(4)}" class="num">${(r.pct*100).toFixed(1)}%</td>
      <td data-col="wbw" data-val="${r.wb_w}" class="num">${r.wb_w||'—'}</td>
      <td data-col="wbl" data-val="${r.wb_l}" class="num">${r.wb_l||'—'}</td>
      <td data-col="wbpct" data-val="${wbTotal?(r.wb_w/wbTotal).toFixed(4):0}" class="num">${wbTotal?(r.wb_w/wbTotal*100).toFixed(1)+'%':'—'}</td>
      <td data-col="cow" data-val="${r.co_w}" class="num" style="color:var(--co-color)">${r.co_w||'—'}</td>
      <td data-col="col" data-val="${r.co_l}" class="num" style="color:var(--co-color)">${r.co_l||'—'}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  
  return html;
}

function closeModal(e){
  if(e.target===document.getElementById('modal-overlay')){
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// ============================================================
// INIT
// ============================================================
nav('pantheon',false);
</script>
</body>
